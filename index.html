    <style>
        :root {
            --bg-0: #1B1023;
            --bg-1: #2A1830;
            --bg-2: #160B1D;
            --gold: #E8B854;
            --gold-soft: #f3d28e;
            --coral: #F0857A;
            --ink: #F5EFE6;
            --ink-dim: #B8A8BE;
            --tg-blue: #27A7E7;
            --ring-amp: 0.18;
            --ring-glow: 0.5;
        }

        * {
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
        }
        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            background: var(--bg-0);
            color: var(--ink);
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            cursor: default;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        .scene {
            position: relative;
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        /* ---- deeper, richer ambient background ---- */
        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(55% 45% at 50% 5%, rgba(232, 184, 84, 0.22), transparent 58%),
                radial-gradient(65% 55% at 82% 88%, rgba(240, 133, 122, 0.18), transparent 58%),
                radial-gradient(75% 65% at 12% 95%, rgba(122, 72, 170, 0.22), transparent 58%),
                radial-gradient(50% 40% at 50% 50%, rgba(245, 210, 142, 0.06), transparent 70%),
                linear-gradient(165deg, var(--bg-0), #1a0e24 40%, var(--bg-2) 75%);
            background-size: 140% 140%, 140% 140%, 140% 140%, 120% 120%, 100% 100%;
            animation: drift 18s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes drift {
            0% {
                background-position: 50% 0%, 85% 90%, 10% 100%, 50% 50%, 0 0;
            }
            100% {
                background-position: 54% 8%, 78% 82%, 18% 92%, 52% 48%, 0 0;
            }
        }

        /* ---- floating spark particles ---- */
        .sparks {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .spark {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: var(--gold-soft);
            animation: floatUp 6s ease-in infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0) scale(0);
            }
            10% {
                opacity: 0.9;
                transform: translateY(-10px) translateX(2px) scale(1);
            }
            60% {
                opacity: 0.5;
                transform: translateY(-160px) translateX(-8px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateY(-280px) translateX(14px) scale(0.3);
            }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            opacity: 0;
            transform: translateY(18px);
            animation: rise 0.85s cubic-bezier(.2, .88, .32, 1) 0.06s forwards;
        }
        @keyframes rise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- bigger profile photo with multi-layer glow ---- */
        .avatar-wrap {
            position: relative;
            width: 172px;
            height: 172px;
            margin-bottom: 22px;
            z-index: 1;
        }

        /* outer ambient glow ring */
        .avatar-glow {
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold), var(--coral), #d4a574, var(--gold-soft), var(--gold));
            opacity: 0.35;
            filter: blur(22px);
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes glowPulse {
            0%,
            100% {
                opacity: 0.3;
                filter: blur(22px);
                transform: scale(1);
            }
            40% {
                opacity: 0.55;
                filter: blur(28px);
                transform: scale(1.06);
            }
            70% {
                opacity: 0.38;
                filter: blur(20px);
                transform: scale(0.97);
            }
        }

        /* main reactive ring */
        .avatar-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold-soft), var(--coral), var(--gold), var(--gold-soft));
            opacity: 0.6;
            filter: blur(7px);
            transform: scale(calc(1 + var(--ring-amp) * 0.22));
            transition: transform 80ms linear, filter 120ms ease, opacity 120ms ease;
            pointer-events: none;
        }

        .avatar-frame {
            position: relative;
            width: 172px;
            height: 172px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(155deg, var(--gold-soft), var(--coral), var(--gold));
            box-shadow: 0 0 40px rgba(232, 184, 84, 0.2), 0 0 80px rgba(240, 133, 122, 0.1);
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            background: var(--bg-1);
            border: 4px solid var(--bg-0);
            transition: transform 0.3s ease;
        }
        .avatar-frame:hover .avatar {
            transform: scale(1.03);
        }
        .avatar-fallback {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fraunces', serif;
            font-size: 64px;
            font-weight: 600;
            color: var(--gold-soft);
            background: radial-gradient(circle at 30% 25%, #3a2147, #1c1024);
            border: 4px solid var(--bg-0);
            transition: transform 0.3s ease;
        }

        .eyebrow {
            margin: 0 0 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold-soft);
            opacity: 0.85;
            animation: fadeInUp 0.7s ease 0.15s both;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 0.85;
                transform: translateY(0);
            }
        }

        .channel-name {
            margin: 0 0 8px;
            font-family: 'Fraunces', serif;
            font-weight: 720;
            font-size: clamp(30px, 8vw, 42px);
            line-height: 1.05;
            letter-spacing: -0.015em;
            animation: fadeInUp 0.7s ease 0.2s both;
            background: linear-gradient(160deg, var(--ink), var(--gold-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            margin: 0 0 24px;
            color: var(--ink-dim);
            font-size: 15px;
            line-height: 1.55;
            max-width: 330px;
            animation: fadeInUp 0.7s ease 0.25s both;
        }

        /* ---- bare waveform with improved idle animation ---- */
        .wave-row {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3.5px;
            height: 48px;
            margin-bottom: 28px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            animation: fadeInUp 0.7s ease 0.3s both;
        }
        .wave-row:focus-visible {
            outline: 2px solid var(--gold-soft);
            outline-offset: 6px;
            border-radius: 6px;
        }
        .vn-bar {
            flex: 1 1 auto;
            min-width: 2.5px;
            max-width: 7px;
            height: 18%;
            border-radius: 4px;
            background: linear-gradient(180deg, var(--gold-soft), var(--coral));
            opacity: 0.85;
            transition: height 100ms ease-out, opacity 100ms ease;
            will-change: height;
        }
        .vn-bar.peaking {
            opacity: 1;
            background: linear-gradient(180deg, #fff5e0, var(--gold), var(--coral));
        }
        .cta {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 24px;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--gold-soft), var(--gold) 50%, #d99f3c);
            color: #23140a;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 17px;
            letter-spacing: 0.01em;
            text-decoration: none;
            box-shadow: 0 10px 28px rgba(232, 184, 84, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.45);
            animation: pulseGlow 2.4s ease-in-out infinite, fadeInUp 0.7s ease 0.35s both;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            z-index: 1;
        }
        .cta::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -75%;
            width: 50%;
            height: 200%;
            background: linear-gradient(105deg, transparent, rgba(255, 255, 255, 0.35), transparent);
            transform: skewX(-20deg);
            animation: shimmer 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes shimmer {
            0%,
            100% {
                left: -75%;
            }
            50% {
                left: 120%;
            }
        }
        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 34px rgba(232, 184, 84, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        .cta:active {
            transform: translateY(0px) scale(0.985);
            transition: transform 0.08s ease;
        }
        .cta .arrow {
            width: 18px;
            height: 18px;
            transition: transform 0.25s ease;
        }
        .cta:hover .arrow {
            transform: translateX(4px);
        }
        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 10px 28px rgba(232, 184, 84, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.45);
            }
            50% {
                box-shadow: 0 10px 38px rgba(232, 184, 84, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            }
        }
        .cta:focus-visible {
            outline: 2px solid var(--gold-soft);
            outline-offset: 4px;
        }

        .trust-list {
            list-style: none;
            margin: 20px 0 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            animation: fadeInUp 0.7s ease 0.4s both;
        }
        .trust-list li {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--ink-dim);
            transition: color 0.3s ease;
        }
        .trust-list li:hover {
            color: var(--ink);
        }
        .trust-list svg {
            width: 16px;
            height: 16px;
            flex: 0 0 auto;
        }

        .divider {
            width: 64px;
            height: 1px;
            background: rgba(245, 239, 230, 0.2);
            margin: 26px 0 16px;
        }

        .footer {
            font-size: 11.5px;
            color: var(--ink-dim);
            opacity: 0.5;
            letter-spacing: 0.01em;
        }

  
    </style>
</head>

                <svg class="arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h13M13 6l6 6-6 6" stroke="#23140a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>

    <audio id="voiceAudio" preload="auto" playsinline autoplay loop>
        <source src="ashish.ogg" type="audio/ogg">
        <source src="ashish.mp3" type="audio/mpeg">
    </audio>

    <script>
        const CONFIG = {
            channelName: "𝑴𝒂𝒓𝒌 𝑨𝒓𝒎𝒚",
            tagline: "A short line about what people get when they join.",
            ctaText: "𝑱𝒐𝒊𝒏 𝒕𝒉𝒆 𝑪𝒉𝒂𝒏𝒏𝒆𝒍", 
            ctaHref: "https://telegram.me/+A-jrN9mOaUBmMmI9", 
            trustPoints: [
                "Best Channel on Telegram",
                "100% Safe & Secure",
                "Trusted by Thousands of Members"
            ]
        };
        /* ===================================================================== */

        // --- Populate content from CONFIG ---
        document.getElementById('channelName').textContent = CONFIG.channelName;
        document.getElementById('tagline').textContent = CONFIG.tagline;
        document.getElementById('ctaText').textContent = CONFIG.ctaText;
        document.getElementById('ctaBtn').href = CONFIG.ctaHref;
        document.getElementById('footer').innerHTML =
            `&copy; ${new Date().getFullYear()} ${CONFIG.channelName}. All rights reserved.`;

        const trustList = document.getElementById('trustList');
        trustList.innerHTML = CONFIG.trustPoints.map(point => `
          <li>
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#E8B854" opacity="0.2"/><path d="M7 12.5l3 3 7-7" stroke="#E8B854" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            ${point}
          </li>`).join('');

        // --- Avatar fallback to monogram if avatar.jpg is missing ---
        const avatarImg = document.getElementById('avatarImg');
        avatarImg.addEventListener('error', () => {
            const wrap = avatarImg.parentElement;
            const initial = (CONFIG.channelName.trim()[0] || '•').toUpperCase();
            wrap.innerHTML = `<div class="avatar-fallback">${initial}</div>`;
        }, { once: true });

        // --- Floating sparks ---
        const sparksContainer = document.getElementById('sparksContainer');
        const SPARK_COUNT = 18;
        for (let i = 0; i < SPARK_COUNT; i++) {
            const spark = document.createElement('div');
            spark.className = 'spark';
            spark.style.left = Math.random() * 90 + '%';
            spark.style.top = (60 + Math.random() * 35) + '%';
            spark.style.animationDuration = (4 + Math.random() * 8) + 's';
            spark.style.animationDelay = Math.random() * 5 + 's';
            spark.style.width = (1 + Math.random() * 2.5) + 'px';
            spark.style.height = spark.style.width;
            sparksContainer.appendChild(spark);
        }

        // --- Build waveform bars ---
        const BAR_COUNT = 34;
        const waveRow = document.getElementById('waveRow');
        const bars = [];
        for (let i = 0; i < BAR_COUNT; i++) {
            const b = document.createElement('div');
            b.className = 'vn-bar';
            waveRow.appendChild(b);
            bars.push(b);
        }

        const audio = document.getElementById('voiceAudio');
        const ring = document.getElementById('avatarRing');

        let audioCtx, analyser, dataArray, sourceNode, rafId, idleId;
        let isReactive = false;

        function ensureGraph() {
            if (audioCtx) return;
            const Ctx = window.AudioContext || window.webkitAudioContext;
            audioCtx = new Ctx();
            sourceNode = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            analyser.smoothingTimeConstant = 0.55;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            sourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);
        }

        function stopIdle() {
            if (idleId) cancelAnimationFrame(idleId);
            idleId = null;
        }
        function stopReactive() {
            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;
            isReactive = false;
        }

        // --- Beautiful idle wave — flowing sine pattern ---
        function idleWave(t) {
            const now = t || performance.now();
            bars.forEach((b, i) => {
                const phase = (now / 550) + (i * 0.45);
                const h = 16 + Math.sin(phase) * 14 + Math.sin(phase * 2.3) * 5 + Math.sin(phase * 0.6 + 1.5) * 8;
                b.style.height = Math.max(8, Math.min(85, h)) + '%';
                b.classList.remove('peaking');
            });
            // Gentle ring pulse in idle
            const amp = 0.16 + Math.sin(now / 650) * 0.09 + Math.sin(now / 1100) * 0.05;
            ring.style.setProperty('--ring-amp', Math.max(0.05, amp).toFixed(3));
            idleId = requestAnimationFrame(idleWave);
        }

        // --- Reactive waveform driven by audio ---
        function reactiveWave() {
            if (!analyser || !isReactive) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            const binStep = dataArray.length / BAR_COUNT;
            for (let i = 0; i < BAR_COUNT; i++) {
                const v = dataArray[Math.floor(i * binStep)] || 0;
                sum += v;
                const pct = (v / 255) * 100;
                bars[i].style.height = Math.max(10, pct) + '%';
                if (v > 180) bars[i].classList.add('peaking');
                else bars[i].classList.remove('peaking');
            }
            const avgAmp = (sum / BAR_COUNT) / 255;
            ring.style.setProperty('--ring-amp', Math.max(0.08, avgAmp * 1.4).toFixed(3));
            if (!audio.paused) {
                rafId = requestAnimationFrame(reactiveWave);
            } else {
                stopReactive();
                idleId = requestAnimationFrame(idleWave);
            }
        }

        // --- Audio event handlers ---
        audio.addEventListener('play', () => {
            stopIdle();
            isReactive = true;
            reactiveWave();
        });
        audio.addEventListener('pause', () => {
            stopReactive();
            if (!idleId) idleId = requestAnimationFrame(idleWave);
        });
        audio.addEventListener('ended', () => {
            stopReactive();
            if (!idleId) idleId = requestAnimationFrame(idleWave);
        });
        audio.addEventListener('error', () => {
            stopReactive();
            if (!idleId) idleId = requestAnimationFrame(idleWave);
            // If audio fails to load, idle animation is the beautiful fallback
            console.warn('Voice audio could not be loaded. Visual ring animation continues.');
        });

        // --- Toggle play/pause by clicking waveform ---
        async function toggleAudio() {
            try {
                ensureGraph();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                if (audio.paused) {
                    await audio.play();
                } else {
                    audio.pause();
                }
            } catch (e) {
